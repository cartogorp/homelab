services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - /srv/appdata/sonarr:/config
      - /srv/media:/srv/media
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - media-net

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - /srv/appdata/radarr:/config
      - /srv/media:/srv/media
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks:
      - media-net

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - /srv/appdata/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - media-net

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - SABNZBD__HOST_WHITELIST=0.0.0.0/0
    volumes:
      - /srv/appdata/sabnzbd:/config
      - /srv/media/downloads:/downloads
    ports:
      - "8085:8080"
    restart: unless-stopped
    networks:
      - media-net

networks:
  media-net:
    external: true
